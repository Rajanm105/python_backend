<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Razorpay Checkout Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 520px;
      margin: 40px auto;
      padding: 20px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      box-sizing: border-box;
    }
    #result {
      margin-top: 20px;
      white-space: pre-wrap;
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h2>Razorpay Payment Demo</h2>

  <label>Amount (INR)</label>
  <input type="number" id="amount" placeholder="499" />

  <label>Receipt / Order Reference</label>
  <input type="text" id="receipt" placeholder="order_1001" />

  <button id="payBtn">Pay Now</button>

  <div id="result"></div>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    const API_BASE = "http://127.0.0.1:8000";

    function showResult(data) {
      document.getElementById("result").textContent =
        typeof data === "string" ? data : JSON.stringify(data, null, 2);
    }

    document.getElementById("payBtn").addEventListener("click", async () => {
      try {
        const amountInr = document.getElementById("amount").value.trim();
        const receipt = document.getElementById("receipt").value.trim();

        if (!amountInr || !receipt) {
          showResult("Please enter amount and receipt.");
          return;
        }

        // Razorpay expects amount in paise
        const createOrderRes = await fetch(`${API_BASE}/payments/create-order`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            amount: Number(amountInr) * 100,
            currency: "INR",
            receipt: receipt
          })
        });

        const orderData = await createOrderRes.json();

        if (!createOrderRes.ok) {
          showResult(orderData);
          return;
        }

        const options = {
          key: orderData.key_id,
          amount: orderData.amount,
          currency: orderData.currency,
          name: "Payment Service Demo",
          description: `Payment for ${orderData.receipt}`,
          order_id: orderData.order_id,
          handler: async function (response) {
            // response contains razorpay_payment_id, razorpay_order_id, razorpay_signature
            const verifyRes = await fetch(`${API_BASE}/payments/verify`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                razorpay_order_id: response.razorpay_order_id,
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_signature: response.razorpay_signature
              })
            });

            const verifyData = await verifyRes.json();
            showResult(verifyData);
          },
          prefill: {
            name: "Demo User",
            email: "demo@example.com",
            contact: "9999999999"
          },
          theme: {
            color: "#3399cc"
          },
          modal: {
            ondismiss: function () {
              showResult("Payment popup closed.");
            }
          }
        };

        const rzp = new Razorpay(options);
        rzp.on("payment.failed", function (response) {
          showResult({
            success: false,
            message: "Payment failed",
            error: response.error
          });
        });

        rzp.open();
      } catch (error) {
        showResult({
          success: false,
          message: "Something went wrong",
          error: String(error)
        });
      }
    });
  </script>
</body>
</html>
